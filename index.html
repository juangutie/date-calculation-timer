<!doctype html>
<title>Date Trainer</title>
<div>
    <output data-date>Month Day Year</output>
</div>
<div>
    <output data-timer>0:000</output>
</div>
<div>
    <button data-new-date-button>New Date</button>
</div>
<div>
    <label for="guess">Guess:</label>
    <select id="guess" disabled data-guess>
        <option value=""></option>
        <option value="0">0 - Sunday</option>
        <option value="1">1 - Monday</option>
        <option value="2">2 - Tuesday</option>
        <option value="3">3 - Wednesday</option>
        <option value="4">4 - Thursday</option>
        <option value="5">5 - Friday</option>
        <option value="6">6 - Saturday</option>
    </select>
</div>
<div>
    <output data-result></output>
</div>
<fieldset data-settings>
    <legend>Settings</legend>
    <ul>
        <li>
            <input type="checkbox" id="month" checked data-month>
            <label for="month">Month</label>
            <ul>
                <li>
                    <label for="month-format">format:</label>
                    <select id="month-format" data-month-format>
                    <option value="long">long</option>
                    <option value="short">short</option>
                    <option value="2-digit">2-digit</option>
                    <option value="numeric">numeric</option>
                    </select>
                <li>
                    <input type="checkbox" disabled>
                    <label>use only these months:</label>
                    <br>
                    <textarea disabled></textarea>
            </ul>
        <li>
            <input type="checkbox" id="day" checked data-day>
            <label for="day">Day</label>
            <ul>
                <li>
                    <label for="day-format">format:</label>
                    <select id="day-format" data-day-format>
                        <option value="numeric">numeric</option>
                        <option value="2-digit">2-digit</option>
                    </select>
                <li>
                    <input type="checkbox" disabled>
                    <label>use only these days:</label>
                    <br>
                    <textarea disabled></textarea>
            </ul>
    <li>
        <input type="checkbox" id="year" checked data-year>
        <label for="year">Year</label>
        <ul>
            <li>
                <input type="checkbox" disabled>
                <label>use only these year endings:</label>
                <br>
                <textarea disabled></textarea>
    </ul>
</fieldset>
<script type="importmap">
{
    "imports": {
        "elements/": "./modules/elements/",
        "utils/": "./modules/utils/",
        "elements": "./modules/elements/_elements.js",
        "events": "./modules/events.js",
        "utils": "./modules/utils/_utils.js"
    }
}
</script>
<script type="module" src="main.js"></script>

<!doctype html>
<title>Date Trainer</title>
<div>
    <output class="js-date">Month Day Year</output>
</div>
<div>
    <output class="js-timer">0:000</output>
</div>
<div>
    <button class="js-new-date-button">New Date</button>
</div>
<div>
    <label for="html-guess">Guess:</label>
    <select id="html-guess" class="js-guess" disabled>
        <option value=""></option>
        <option value="0">0 - Sunday</option>
        <option value="1">1 - Monday</option>
        <option value="2">2 - Tuesday</option>
        <option value="3">3 - Wednesday</option>
        <option value="4">4 - Thursday</option>
        <option value="5">5 - Friday</option>
        <option value="6">6 - Saturday</option>
    </select>
</div>
<div>
    <output class="js-result"></output>
</div>
<fieldset class="js-settings">
    <legend>Settings</legend>
    <ul>
        <li>
            <input type="checkbox" id="html-month" class="js-month" checked="true">
            <label for="html-month">Month</label>
            <ul>
                <li>
                    <label for="html-month-format">format:</label>
                    <select id="html-month-format" class="js-month-format">
                    <option value="long">long</option>
                    <option value="short">short</option>
                    <option value="2-digit">2-digit</option>
                    <option value="numeric">numeric</option>
                    </select>
                <li>
                    <input type="checkbox" disabled>
                    <label>use only these months:</label>
                    <br>
                    <textarea disabled></textarea>
            </ul>
        <li>
            <input type="checkbox" id="html-day" class="js-day" checked="true">
            <label for="html-day">Day</label>
            <ul>
                <li>
                    <label for="html-day-format">format:</label>
                    <select id="html-day-format" class="js-day-format">
                        <option value="numeric">numeric</option>
                        <option value="2-digit">2-digit</option>
                    </select>
                <li>
                    <input type="checkbox" disabled>
                    <label>use only these days:</label>
                    <br>
                    <textarea disabled></textarea>
            </ul>
    <li>
        <input type="checkbox" id="html-year" class="js-year" checked="true">
        <label for="html-year">Year</label>
        <ul>
            <li>
                <input type="checkbox" disabled>
                <label>use only these year endings:</label>
                <br>
                <textarea disabled></textarea>
    </ul>
</fieldset>
<script type="module" src="main.js"></script>
